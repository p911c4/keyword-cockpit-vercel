<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEYWORD COCKPIT — 네이버 키워드 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg2: #f4f4f4;
  --bg3: #fafafa;
  --border: #e5e5e5;
  --border2: #d0d0d0;
  --blue: #1428a0;
  --blue2: #1a34c8;
  --blue-light: #e8ebfc;
  --blue-pale: #f0f2fd;
  --text: #1a1a1a;
  --text2: #444444;
  --text3: #888888;
  --green: #00b200;
  --green-bg: #e6f7e6;
  --red: #c00;
  --red-bg: #fff0f0;
  --amber: #b06000;
  --amber-bg: #fff8e6;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
  --radius: 8px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px}
body{background:var(--bg2);color:var(--text);font-family:'Noto Sans KR','Roboto',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* Top nav */
.topbar{background:var(--blue);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-logo{width:28px;height:28px;display:flex;align-items:center;justify-content:center;}
.topbar-name{color:#fff;font-size:16px;font-weight:700;letter-spacing:-0.3px}
.topbar-status{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.75);font-weight:300}
.status-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3);flex-shrink:0}
.status-dot.live{background:#4cff8f;animation:blink 2.5s infinite}
.status-dot.err{background:#ff6060}

/* Layout */
.page{max-width:780px;margin:0 auto;padding:28px 16px 80px}

/* Hero */
.hero{background:var(--blue);border-radius:var(--radius);padding:28px 28px 24px;margin-bottom:16px;color:#fff;animation:fadeUp 0.4s ease both}
.hero-eyebrow{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:8px}
.hero-title{font-size:clamp(22px,4vw,30px);font-weight:700;line-height:1.2;letter-spacing:-0.5px;margin-bottom:6px}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.7);font-weight:300;line-height:1.6}

/* Card */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;box-shadow:var(--shadow-sm);overflow:hidden;animation:fadeUp 0.4s ease both}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:0.2px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:3px;height:14px;background:var(--blue);border-radius:2px;flex-shrink:0}
.card-body{padding:20px}

/* Input */
.kw-row{display:flex;gap:8px}
.input{background:var(--bg);border:1.5px solid var(--border2);border-radius:6px;padding:11px 14px;font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color 0.15s,box-shadow 0.15s;width:100%}
.input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(20,40,160,0.1)}
.input::placeholder{color:#bbb}

/* Buttons */
.btn{font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;border:none;border-radius:6px;cursor:pointer;padding:10px 20px;transition:all 0.15s;white-space:nowrap;letter-spacing:0.2px}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue2);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-outline{background:transparent;color:var(--text2);border:1.5px solid var(--border2)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-pale)}
.btn-sm{padding:7px 14px;font-size:12px}

/* Loading */
.loading-wrap{display:none;padding:48px 20px;flex-direction:column;align-items:center;gap:16px}
.loading-wrap.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite}
.loading-txt{font-size:13px;color:var(--text3);font-weight:300}

/* Error */
.errbox{background:var(--red-bg);border:1px solid rgba(200,0,0,0.2);border-radius:var(--radius);padding:16px 20px;margin-bottom:14px;font-size:13px;line-height:1.7;color:var(--red);display:none}
.errbox.show{display:block}
.errbox code{background:rgba(200,0,0,0.08);padding:1px 6px;border-radius:3px;font-size:12px;font-family:monospace}

/* Results */
.results-panel{display:none}
.results-panel.show{display:block}
.results-topbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:2px}
.results-meta{font-size:12px;color:var(--text3)}
.exp-row{display:flex;gap:6px}

/* KW card */
.kwcard{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-top:12px;overflow:hidden;box-shadow:var(--shadow-sm);animation:fadeUp 0.35s ease both;transition:box-shadow 0.2s}
.kwcard:hover{box-shadow:var(--shadow-md)}
.kwcard-head{padding:14px 20px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.kwname{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.comp-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:0.3px}
.c-low{background:var(--green-bg);color:var(--green)}
.c-mid{background:var(--amber-bg);color:var(--amber)}
.c-high{background:var(--red-bg);color:var(--red)}
.kwcard-body{padding:18px 20px}

/* Stat grid */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.scell{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 12px;text-align:center}
.slbl{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px}
.snum{font-size:26px;font-weight:700;letter-spacing:-1px;line-height:1;font-family:'Roboto',sans-serif}
.snum.pc{color:var(--blue)}
.snum.mo{color:#0099cc}
.snum.tot{color:var(--text)}
.sunit{font-size:10px;color:var(--text3);margin-top:4px}

/* Bar */

/* Related */
.rel-sec{border-top:1px solid var(--border);padding-top:14px}
.rel-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
.rel-list{display:flex;flex-wrap:wrap;gap:7px}
.rtag{display:inline-flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.15s;font-weight:400}
.rtag:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-pale)}
.rvol{font-size:10px;color:var(--text3)}

/* 뉴카 포스팅 박스 */

/* Rank / Blog posts */
.rank-sec{border-top:1px solid var(--border);padding-top:14px;margin-top:14px}
.rank-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.rank-load-btn{font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:600;color:var(--blue);background:var(--blue-pale);border:1px solid rgba(20,40,160,0.2);border-radius:4px;padding:3px 10px;cursor:pointer;transition:all 0.15s}
.rank-load-btn:hover{background:var(--blue);color:#fff}
.rank-load-btn:disabled{opacity:0.5;cursor:not-allowed}
.rank-list{display:flex;flex-direction:column;gap:6px}
.rank-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;text-decoration:none;transition:all 0.15s}
.rank-item:hover{border-color:var(--blue);background:var(--blue-pale)}
.rank-num{font-size:12px;font-weight:700;color:#fff;background:var(--blue);border-radius:4px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Roboto',sans-serif}
.rank-info{flex:1;min-width:0}
.rank-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.rank-item:hover .rank-title{color:var(--blue)}
.rank-desc{font-size:11px;color:var(--text3);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.rank-blogger{font-size:10px;color:var(--text3);margin-top:2px}
.rank-empty{font-size:12px;color:var(--text3);padding:12px;text-align:center}
.rank-loading{font-size:12px;color:var(--text3);padding:12px;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px}
.rank-spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}

/* Console */
.console{position:fixed;bottom:0;left:0;right:0;background:var(--text);padding:10px 20px;display:flex;align-items:center;gap:10px;font-size:12px;color:rgba(255,255,255,0.7);z-index:99;box-shadow:0 -2px 12px rgba(0,0,0,0.15)}
.cdot{width:6px;height:6px;border-radius:50%;background:#555;flex-shrink:0}
.cdot.ok{background:#4cff8f}
.cdot.busy{background:#ffc107;animation:blink 0.5s infinite}
.cdot.fail{background:#ff6060}

/* ── 트렌드 선 그래프 ── */
.trend-sec {
  border-top: 1px solid var(--border);
  padding-top: 14px;
  margin-bottom: 16px;
}
.trend-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 6px;
}
.trend-lbl {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.trend-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
}
.trend-up   { background: var(--green-bg); color: var(--green); }
.trend-down { background: var(--red-bg);   color: var(--red); }
.trend-flat { background: var(--amber-bg); color: var(--amber); }

.trend-chart-wrap {
  position: relative;
  width: 100%;
  height: 120px;
}
.trend-chart-wrap svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}
.trend-loading {
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text3);
}
.trend-summary {
  font-size: 12px;
  color: var(--text2);
  margin-top: 10px;
  line-height: 1.6;
}
.trend-summary b { color: var(--blue); }
.trend-summary .up   { color: var(--green); font-weight: 700; }
.trend-summary .down { color: var(--red);   font-weight: 700; }

/* SVG 툴팁 */
.trend-tooltip {
  position: absolute;
  background: var(--text);
  color: #fff;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 4px;
  pointer-events: none;
  white-space: nowrap;
  z-index: 20;
  display: none;
  transform: translate(-50%, -100%);
  margin-top: -6px;
  font-family: 'Roboto', monospace;
}

/* ── 최근 검색 ── */
.recent-wrap {
  margin-top: 14px;
  display: none;
}
.recent-wrap.show { display: block; }
.recent-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.3px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.recent-clear {
  font-size: 11px;
  color: var(--text3);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  font-family: 'Noto Sans KR', sans-serif;
  transition: color 0.15s;
}
.recent-clear:hover { color: var(--red); }
.recent-list {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}
.recent-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--bg2);
  border: 1.5px solid var(--border2);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.recent-tag:hover {
  border-color: var(--blue);
  color: var(--blue);
  background: var(--blue-pale);
}
.recent-tag .rtag-icon {
  font-size: 11px;
  opacity: 0.5;
}
.recent-tag .rtag-del {
  font-size: 14px;
  opacity: 0.35;
  line-height: 1;
  transition: opacity 0.15s;
  margin-left: 2px;
}
.recent-tag .rtag-del:hover { opacity: 1; color: var(--red); }

/* ── 태블릿 ── */
@media(max-width:768px){
  .page{padding:20px 12px 80px}
  .hero{padding:22px 18px}
  .sgrid{grid-template-columns:repeat(3,1fr)}
}

/* ── 모바일 ── */
@media(max-width:600px){
  html{font-size:16px}
  .topbar{padding:0 16px;height:52px}
  .topbar-name{font-size:14px}
  .topbar-logo{width:26px;height:26px;}
  .topbar-status{font-size:11px}
  .page{padding:16px 12px 70px}

  /* Hero */
  .hero{padding:20px 16px 18px;margin-bottom:12px}
  .hero-eyebrow{font-size:10px;letter-spacing:1.5px}
  .hero-title{font-size:21px}
  .hero-sub{font-size:12px}

  /* Card */
  .card-header{padding:12px 16px}
  .card-title{font-size:13px}
  .card-body{padding:16px}

  /* 입력 — 모바일에서 세로 배치 */
  .kw-row{flex-direction:column;gap:10px}
  .kw-row .btn{width:100%;padding:13px}
  .input{padding:13px 14px;font-size:16px}

  /* 결과 헤더 — 줄바꿈 */
  .results-topbar{width:100%}
  .results-meta{font-size:11px;width:100%}
  .exp-row{width:100%}
  .exp-row .btn{flex:1}

  /* KW 카드 */
  .kwcard-head{padding:12px 14px}
  .kwname{font-size:17px}
  .kwcard-body{padding:14px}

  /* 통계 — 모바일에서 한 줄에 3개 유지하되 작게 */
  .sgrid{grid-template-columns:repeat(3,1fr);gap:7px}
  .scell{padding:11px 6px}
  .slbl{font-size:9px;letter-spacing:0.3px}
  .snum{font-size:19px}
  .sunit{font-size:9px}

  /* 연관 키워드 */
  .rel-lbl{font-size:11px}
  .rtag{font-size:12px;padding:6px 12px}

  /* 블로그 상위 포스팅 */
  .rank-item{padding:10px}
  .rank-title{font-size:13px}
  .rank-desc{font-size:11px}
  .rank-num{width:22px;height:22px;font-size:11px}

  /* 콘솔바 */
  .console{padding:9px 14px;font-size:11px}
}

/* ── 작은 모바일 (375px 이하) ── */
@media(max-width:380px){
  .hero-title{font-size:19px}
  .sgrid{grid-template-columns:1fr 1fr;gap:8px}
  .snum{font-size:22px}
  .topbar-status span:nth-child(3),.topbar-status{gap:4px}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--blue)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">
      <svg width="32" height="32" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="tl" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#a8d4f5"/></linearGradient></defs>
        <line x1="4" y1="56" x2="60" y2="56" stroke="url(#tl)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M4,56 C18,54 32,36 52,14" fill="none" stroke="url(#tl)" stroke-width="2.5" stroke-linecap="round"/>
        <g transform="translate(52,14) rotate(-45)">
          <ellipse cx="0" cy="0" rx="8" ry="2.2" fill="url(#tl)"/>
          <path d="M -1,-1.5 L -10,-13 L -3,-2 Z" fill="url(#tl)"/>
          <path d="M -1,1.5 L 6,13 L 1.5,2 Z" fill="url(#tl)"/>
          <path d="M 4.5,-1.2 L 9,-7 L 6,-0.4 Z" fill="url(#tl)"/>
          <path d="M 4.5,1.2 L 9,6 L 6,0.4 Z" fill="url(#tl)"/>
          <path d="M 4,0 L 8.5,-3 L 7,0 Z" fill="url(#tl)"/>
        </g>
      </svg>
    </div>
    <div class="topbar-name">KEYWORD COCKPIT</div>
  </div>
  <div class="topbar-status">
    <div class="status-dot live" id="apiDot"></div>
    <span id="apiTxt">서버 연결됨</span>
    &nbsp;·&nbsp;
    <span id="clock">--:--</span>
  </div>
</div>

<div class="page">

  <div class="hero">
    <div class="hero-eyebrow">Naver Search Advertising API</div>
    <div class="hero-title">네이버 키워드 검색량 분석 v1.4</div>
    <div class="hero-sub">키워드를 입력하면 월간 PC·모바일 검색량과 연관 키워드를 즉시 조회합니다.</div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">키워드 입력</div>
      <div style="font-size:12px;color:var(--text3)">키워드 1개</div>
    </div>
    <div class="card-body">
      <div class="kw-row">
        <input class="input" type="search" id="kwInp"
          placeholder="키워드 입력 후 검색"
          inputmode="search"
          enterkeyhint="search"
          onkeydown="if(event.key==='Enter'||event.keyCode===13) { event.preventDefault(); doSearch(); }"
          autofocus />
        <button class="btn btn-primary" onclick="doSearch()">검색</button>
      </div>
      <div class="recent-wrap" id="recentWrap">
        <div class="recent-label">
          <span>🕒 최근 검색</span>
          <button class="recent-clear" onclick="clearRecent()">전체 삭제</button>
        </div>
        <div class="recent-list" id="recentList"></div>
      </div>
    </div>
  </div>

  <div class="loading-wrap" id="loadingWrap">
    <div class="spinner"></div>
    <div class="loading-txt">네이버 데이터베이스에서 검색량을 가져오는 중...</div>
  </div>

  <div class="errbox" id="errBox"></div>

  <div class="results-panel" id="resultsPanel">
    <div class="card">
      <div class="card-header">
        <div class="card-title">분석 결과</div>
        <div class="results-topbar">
          <div class="results-meta" id="rmeta"></div>
          <div class="exp-row">
            <button class="btn btn-outline btn-sm" onclick="exportCSV()">CSV 저장</button>
            <button class="btn btn-outline btn-sm" onclick="copyJSON()">JSON 복사</button>
          </div>
        </div>
      </div>
      <div class="card-body" id="resList"></div>
    </div>
  </div>

</div>

<div class="console">
  <div class="cdot ok" id="cdot"></div>
  <span id="ctxt">준비 완료 — 키워드를 입력하고 검색하세요</span>
</div>

<script>
let kws  = [];
let data = [];

setInterval(() => {
  const t = new Date();
  document.getElementById('clock').textContent =
    t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
}, 1000);

// ── 최근 검색 기록 ──────────────────────────────────
const MAX_RECENT = 5;

function getRecent() {
  try { return JSON.parse(localStorage.getItem('recentKw') || '[]'); }
  catch(e) { return []; }
}

function saveRecent(kw) {
  let list = getRecent().filter(k => k !== kw); // 중복 제거
  list.unshift(kw);                              // 맨 앞에 추가
  list = list.slice(0, MAX_RECENT);              // 5개 제한
  localStorage.setItem('recentKw', JSON.stringify(list));
  renderRecent();
}

function clearRecent() {
  localStorage.removeItem('recentKw');
  renderRecent();
}

function deleteRecentOne(kw, e) {
  e.stopPropagation();
  const list = getRecent().filter(k => k !== kw);
  localStorage.setItem('recentKw', JSON.stringify(list));
  renderRecent();
}
function renderRecent() {
  const list = getRecent();
  const wrap = document.getElementById('recentWrap');
  const el   = document.getElementById('recentList');
  if (!wrap || !el) return;
  if (list.length === 0) { wrap.classList.remove('show'); return; }
  wrap.classList.add('show');
  el.innerHTML = list.map(kw => {
    const safe = kw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    return `
    <div class="recent-tag" onclick="searchFromRecent(this.dataset.kw)" data-kw="${safe}">
      <span class="rtag-icon">🕒</span>
      <span>${safe}</span>
      <span class="rtag-del" onclick="deleteRecentThis(this, event)">×</span>
    </div>`;
  }).join('');
}

function searchFromRecent(kw) {
  document.getElementById('kwInp').value = kw;
  kws = [kw];
  saveRecent(kw);
  log('busy', '"' + kw + '" 검색 중...');
  runScan();
}

function deleteRecentThis(el, e) {
  e.stopPropagation();
  const kw = el.closest('.recent-tag').dataset.kw;
  const list = getRecent().filter(k => k !== kw);
  localStorage.setItem('recentKw', JSON.stringify(list));
  renderRecent();
}

// DOM 준비 후 초기 렌더링
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', renderRecent);
} else {
  renderRecent();
}


function doSearch() {
  const inp = document.getElementById('kwInp');
  const kw  = inp.value.trim().replace(/\s+/g, '');
  if (!kw) return;
  kws = [kw];
  inp.value = '';
  saveRecent(kw);  // 최근 검색 저장
  log('busy', `"${kw}" 검색 중...`);
  runScan();
}

async function runScan() {
  log('busy', '데이터를 가져오는 중...');
  document.getElementById('loadingWrap').classList.add('show');
  document.getElementById('resultsPanel').classList.remove('show');
  document.getElementById('errBox').classList.remove('show');

  try {
    const res = await fetch('/api/keyword', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ keywords: kws })
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || `오류 ${res.status}`);

    data = (json.keywordList || []).map(d => ({
      kw:     d.relKeyword,
      pc:     d.monthlyPcQcCnt     === '< 10' ? 5 : (parseInt(d.monthlyPcQcCnt)     || 0),
      mo:     d.monthlyMobileQcCnt === '< 10' ? 5 : (parseInt(d.monthlyMobileQcCnt) || 0),
      comp:   d.compIdx || 'N/A',
      isHint: kws.includes(d.relKeyword),
    }));

    renderResults();
    log('ok', `조회 완료 — 총 ${data.length}개 키워드 데이터`);

  } catch(e) {
    document.getElementById('loadingWrap').classList.remove('show');
    if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
      showErr(`<strong>서버에 연결할 수 없습니다.</strong><br>터미널에서 <code>node server.js</code>를 실행한 후 다시 시도하세요.`);
      log('fail', '서버 연결 실패');
    } else {
      showErr(`<strong>오류:</strong> ${e.message}`);
      log('fail', '조회 실패: ' + e.message);
    }
  }
}

function renderResults() {
  document.getElementById('loadingWrap').classList.remove('show');
  document.getElementById('resultsPanel').classList.add('show');

  const main = data.filter(d => d.isHint);
  const rel  = data.filter(d => !d.isHint).sort((a,b) => (b.pc+b.mo)-(a.pc+a.mo));
  const maxT = Math.max(...data.map(d => d.pc+d.mo), 1);

  const now = new Date();
  document.getElementById('rmeta').textContent =
    `기본 키워드 ${main.length}개 · 연관 키워드 ${rel.length}개 · ${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

  document.getElementById('resList').innerHTML =
    main.length ? main.map((d,i) => card(d,i,maxT,rel)).join('')
    : '<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px">검색 결과가 없습니다.<br>다른 키워드로 다시 시도해 보세요.</div>';

  setTimeout(() => {
    main.forEach(d => {
      const rankId = 'rank-' + d.kw.replace(/[^a-zA-Z0-9가-힣]/g,'');
      loadTrend(d.kw, rankId);
    });
  }, 60);
}

const compMap = {'LOW':'c-low','낮음':'c-low','MID':'c-mid','MEDIUM':'c-mid','중간':'c-mid','HIGH':'c-high','높음':'c-high'};
const compTxtMap = {'c-low':'경쟁 낮음','c-mid':'경쟁 중간','c-high':'경쟁 높음'};

function card(d, i, maxT, rel) {
  const tot   = d.pc + d.mo;
  const pcPct = tot > 0 ? Math.round(d.pc/tot*100) : 0;
  const pcW   = Math.round(d.pc/maxT*100);
  const moW   = Math.round(d.mo/maxT*100);
  const cCls  = compMap[(d.comp||'').toUpperCase?.()] || compMap[d.comp] || 'c-mid';
  const cTxt  = compTxtMap[cCls] || 'N/A';
  const rankId = 'rank-' + d.kw.replace(/[^a-zA-Z0-9가-힣]/g,'');

  const relHtml = rel.length ? `
    <div class="rel-sec">
      <div class="rel-lbl">연관 키워드 (${Math.min(rel.length,10)}개)</div>
      <div class="rel-list">
        ${rel.slice(0,10).map(r=>`
          <div class="rtag" onclick="searchRelated('${r.kw.replace(/'/g,"\\'")}')">
            ${r.kw}<span class="rvol">${fmt(r.pc+r.mo)}</span>
          </div>`).join('')}
      </div>
    </div>` : '';

  return `
    <div class="kwcard" style="animation-delay:${i*0.06}s">
      <div class="kwcard-head">
        <div class="kwname">${d.kw}</div>
        <div class="comp-pill ${cCls}">${cTxt}</div>
      </div>
      <div class="kwcard-body">
        <div class="sgrid">
          <div class="scell"><div class="slbl">PC 월간</div><div class="snum pc">${fmt(d.pc)}</div><div class="sunit">PC ${pcPct}%</div></div>
          <div class="scell"><div class="slbl">모바일 월간</div><div class="snum mo">${fmt(d.mo)}</div><div class="sunit">모바일 ${100-pcPct}%</div></div>
          <div class="scell"><div class="slbl">합계</div><div class="snum tot">${fmt(tot)}</div><div class="sunit">월간 총합</div></div>
        </div>

        <div class="trend-sec">
          <div class="trend-header">
            <div class="trend-lbl">📈 검색 트렌드 (최근 12개월)</div>
            <div class="trend-badge trend-flat" id="badge-${rankId}">분석 중...</div>
          </div>
          <div class="trend-chart-wrap" id="trend-${rankId}">
            <div class="trend-loading"><div class="rank-spinner"></div>트렌드 데이터 로딩 중...</div>
          </div>
          <div class="trend-summary" id="trend-sum-${rankId}"></div>
        </div>
        ${relHtml}

        <div class="rank-sec">
          <div class="rank-lbl">
            <span>네이버 블로그 상위 포스팅</span>
            <button class="rank-load-btn" id="btn-${rankId}" onclick="loadBlogPosts('${d.kw.replace(/'/g,"\\'")}','${rankId}')">불러오기</button>
          </div>
          <div class="rank-list" id="${rankId}">
            <div class="rank-empty">위 버튼을 클릭하면 상위 포스팅 10개를 가져옵니다</div>
          </div>
        </div>
      </div>
    </div>`;
}

function fmt(n) {
  if (n >= 10000) return (n/10000).toFixed(1)+'만';
  return n.toLocaleString('ko-KR');
}

// 연관 키워드 클릭 시 바로 검색
function searchRelated(kw) {
  document.getElementById('kwInp').value = kw;
  kws = [kw];
  log('busy', `"${kw}" 검색 중...`);
  runScan();
}

// 네이버 블로그 상위 포스팅 로드
async function loadBlogPosts(kw, rankId) {
  const listEl = document.getElementById(rankId);
  const btnEl  = document.getElementById('btn-' + rankId);
  if (!listEl) return;
  btnEl.disabled = true;
  btnEl.textContent = '로딩 중...';
  listEl.innerHTML = '<div class="rank-loading"><div class="rank-spinner"></div>포스팅을 가져오는 중...</div>';
  try {
    const res  = await fetch(`/api/blog?query=${encodeURIComponent(kw)}&display=10`);
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || '오류');
    const items = json.items || [];
    if (items.length === 0) {
      listEl.innerHTML = '<div class="rank-empty">검색 결과가 없습니다</div>';
      return;
    }
    listEl.innerHTML = items.map((item, i) => `
      <a class="rank-item" href="${item.link}" target="_blank" rel="noopener">
        <span class="rank-num">${i+1}</span>
        <div class="rank-info">
          <div class="rank-title">${item.title.replace(/<[^>]+>/g,'')}</div>
          <div class="rank-desc">${(item.description||'').replace(/<[^>]+>/g,'')}</div>
          <div class="rank-blogger">✍️ ${item.bloggername||''}</div>
        </div>
      </a>`).join('');
    btnEl.textContent = '새로고침';
    btnEl.disabled = false;
    log('ok', `"${kw}" 블로그 상위 포스팅 ${items.length}개 로드 완료`);
  } catch(e) {
    listEl.innerHTML = `<div class="rank-empty">불러오기 실패: ${e.message}</div>`;
    btnEl.textContent = '다시 시도';
    btnEl.disabled = false;
  }
}

function showErr(html) {
  const el = document.getElementById('errBox');
  el.innerHTML = html;
  el.classList.add('show');
}

function log(type, msg) {
  document.getElementById('cdot').className = 'cdot' + (type ? ' '+type : '');
  document.getElementById('ctxt').textContent = msg;
}

// 트렌드 선 그래프 로드
async function loadTrend(kw, rankId) {
  const wrapEl  = document.getElementById('trend-' + rankId);
  const badgeEl = document.getElementById('badge-' + rankId);
  const sumEl   = document.getElementById('trend-sum-' + rankId);
  if (!wrapEl) return;

  try {
    const res  = await fetch('/api/trend', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ keyword: kw })
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || '오류');

    const results = json.results?.[0]?.data || [];
    if (results.length === 0) {
      wrapEl.innerHTML = '<div class="trend-loading">데이터 없음</div>';
      badgeEl.textContent = '데이터 없음';
      return;
    }

    const values = results.map(d => d.ratio);
    const labels = results.map(d => d.period.slice(0,7));
    const maxVal = Math.max(...values, 1);
    const minVal = Math.min(...values);

    // 트렌드 방향 계산
    const recent3 = values.slice(-3);
    const prev3   = values.slice(-6, -3);
    const rAvg = recent3.reduce((a,b)=>a+b,0)/recent3.length;
    const pAvg = prev3.reduce((a,b)=>a+b,0)/Math.max(prev3.length,1);
    const diff = ((rAvg - pAvg) / Math.max(pAvg, 1)) * 100;

    // 배지
    let badgeCls, badgeTxt;
    if (diff > 10)       { badgeCls='trend-up';   badgeTxt=`📈 상승 +${diff.toFixed(0)}%`; }
    else if (diff < -10) { badgeCls='trend-down';  badgeTxt=`📉 하락 ${diff.toFixed(0)}%`; }
    else                 { badgeCls='trend-flat';  badgeTxt=`➡️ 보합 ${diff>=0?'+':''}${diff.toFixed(0)}%`; }
    badgeEl.className   = 'trend-badge ' + badgeCls;
    badgeEl.textContent = badgeTxt;

    // SVG 선 그래프 생성
    const W = 600, H = 90;
    const padL = 8, padR = 8, padT = 16, padB = 28;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;
    const n = values.length;

    const xPos = i => padL + (i / (n-1)) * chartW;
    const yPos = v => padT + chartH - ((v - minVal) / Math.max(maxVal - minVal, 1)) * chartH;

    // 폴리라인 포인트
    const pts = values.map((v,i) => `${xPos(i)},${yPos(v)}`).join(' ');

    // 그라디언트 채우기 경로
    const fillPath = `M${xPos(0)},${yPos(values[0])} ` +
      values.map((v,i) => `L${xPos(i)},${yPos(v)}`).join(' ') +
      ` L${xPos(n-1)},${H-padB} L${xPos(0)},${H-padB} Z`;

    // X축 레이블 — 3개월마다 표시 + 마지막
    const xLabels = labels.map((lbl, i) => {
      if (i % 3 !== 0 && i !== n-1) return '';
      const mon = lbl.slice(5,7) + '월';
      return `<text x="${xPos(i)}" y="${H-padB+14}" text-anchor="middle"
        font-size="9" fill="#999" font-family="Roboto,sans-serif">${mon}</text>`;
    }).join('');

    // 데이터 포인트 원
    const dots = values.map((v,i) => {
      const isLast = i === n-1;
      const isPeak = v === maxVal;
      const r = isPeak ? 5 : isLast ? 5 : 3.5;
      const fill = isPeak ? '#1428a0' : isLast ? '#1428a0' : '#fff';
      const stroke = '#1428a0';
      const sw = isPeak ? 2.5 : isLast ? 2.5 : 2;
      return `<circle cx="${xPos(i)}" cy="${yPos(v)}" r="${r}"
        fill="${fill}" stroke="${stroke}" stroke-width="${sw}"
        style="cursor:pointer"
        onmouseenter="showTrendTip(event,'${lbl(labels[i])}  ${v.toFixed(1)}%')"
        onmouseleave="hideTrendTip()"/>`;
    }).join('');

    // 최고점 라벨
    const peakIdx = values.indexOf(maxVal);
    const peakLabel = `<text x="${xPos(peakIdx)}" y="${yPos(maxVal)-10}"
      text-anchor="middle" font-size="10" fill="#1428a0"
      font-family="Roboto,sans-serif" font-weight="700">${maxVal.toFixed(1)}%</text>`;

    const svg = `
      <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block">
        <defs>
          <linearGradient id="tg-${rankId}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#1428a0" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#1428a0" stop-opacity="0.01"/>
          </linearGradient>
        </defs>
        <!-- 그리드 라인 -->
        <line x1="${padL}" y1="${padT}" x2="${W-padR}" y2="${padT}"
          stroke="#e5e5e5" stroke-width="1" stroke-dasharray="3,3"/>
        <line x1="${padL}" y1="${padT+chartH/2}" x2="${W-padR}" y2="${padT+chartH/2}"
          stroke="#e5e5e5" stroke-width="1" stroke-dasharray="3,3"/>
        <line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}"
          stroke="#e0e0e0" stroke-width="1"/>
        <!-- 채우기 -->
        <path d="${fillPath}" fill="url(#tg-${rankId})"/>
        <!-- 선 -->
        <polyline points="${pts}"
          fill="none" stroke="#1428a0" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"/>
        <!-- X축 레이블 -->
        ${xLabels}
        <!-- 데이터 포인트 -->
        ${dots}
        <!-- 최고점 라벨 -->
        ${peakLabel}
      </svg>
      <div class="trend-tooltip" id="ttip-${rankId}"></div>`;

    wrapEl.innerHTML = svg;
    wrapEl.style.height = 'auto';

    // 요약
    const peak = results.reduce((a,b) => a.ratio>b.ratio ? a : b);
    const diffCls = diff > 10 ? 'up' : diff < -10 ? 'down' : '';
    const diffStr = (diff >= 0 ? '+' : '') + diff.toFixed(0) + '%';
    sumEl.innerHTML = `최고: <b>${peak.ratio.toFixed(1)}%</b> (${peak.period.slice(0,7)}) · 전분기 대비 <span class="${diffCls}"><b>${diffStr}</b></span>`;

  } catch(e) {
    wrapEl.innerHTML = `<div class="trend-loading" style="color:var(--red)">트렌드 로드 실패: ${e.message}</div>`;
    console.error('trend error', e);
  }
}

function lbl(s) { return s.slice(0,7); }

function showTrendTip(e, text) {
  const el = e.target.closest('.trend-chart-wrap')?.querySelector('[id^="ttip-"]');
  if (!el) return;
  el.textContent = text;
  el.style.display = 'block';
  const rect = e.target.closest('.trend-chart-wrap').getBoundingClientRect();
  const cx   = e.clientX - rect.left;
  const cy   = e.clientY - rect.top;
  el.style.left = cx + 'px';
  el.style.top  = cy + 'px';
}

function hideTrendTip() {
  document.querySelectorAll('[id^="ttip-"]').forEach(el => el.style.display='none');
}

function exportCSV() {
  if (!data.length) return;
  const rows = [['키워드','PC 월간','모바일 월간','합계','경쟁도']];
  data.forEach(d => rows.push([d.kw, d.pc, d.mo, d.pc+d.mo, d.comp]));
  const blob = new Blob(['\uFEFF'+rows.map(r=>r.join(',')).join('\n')], {type:'text/csv;charset=utf-8;'});
  Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: `키워드분석_${new Date().toISOString().slice(0,10)}.csv`
  }).click();
  log('ok', 'CSV 파일로 저장됐습니다');
}

function copyJSON() {
  if (!data.length) return;
  navigator.clipboard.writeText(JSON.stringify(data,null,2))
    .then(() => log('ok', 'JSON이 클립보드에 복사됐습니다'));
}
</script>
